# ============================================================
# 6. CRITERIOS DE ACEITE
# ============================================================
acceptance_criteria:
  functional:
    # --- Imagem em Serviço ---
    - id: "AC-001"
      given: "Modal de criar serviço aberto"
      when: "Usuário seleciona uma imagem JPEG de 2MB"
      then: "Preview da imagem aparece no formulário; ao salvar, FormData inclui campo 'image'"

    - id: "AC-002"
      given: "Modal de criar serviço aberto"
      when: "Usuário seleciona arquivo PDF"
      then: "Input rejeita (accept filter) ou server action retorna erro 'Formato de imagem inválido'"

    - id: "AC-003"
      given: "Modal de criar serviço aberto"
      when: "Usuário seleciona imagem PNG de 8MB"
      then: "Server action retorna erro 'Imagem deve ter no máximo 5MB'"

    - id: "AC-004"
      given: "Modal de criar serviço aberto"
      when: "Usuário NÃO seleciona imagem e preenche nome e preço"
      then: "Serviço é criado normalmente (imagem é opcional)"

    - id: "AC-005"
      given: "Modal de editar serviço com imageUrl existente"
      when: "Modal abre"
      then: "Preview mostra a imagem atual (imageUrl do serviço)"

    - id: "AC-006"
      given: "Modal de editar serviço com imageUrl existente"
      when: "Usuário clica no X para remover a imagem e salva"
      then: "FormData não inclui campo 'image'; serviço é atualizado sem alterar imagem"

    # --- agentInstructions ---
    - id: "AC-007"
      given: "Modal de criar serviço aberto"
      when: "Usuário preenche 'Instruções para o agente IA' com texto de 500 chars"
      then: "Campo salvo com sucesso; visível ao reabrir modal de edição"

    - id: "AC-008"
      given: "Modal de criar serviço aberto"
      when: "Usuário tenta digitar mais de 2000 caracteres"
      then: "maxLength impede no input; se bypass, server action retorna erro"

    - id: "AC-009"
      given: "Modal de editar serviço com agentInstructions existente"
      when: "Modal abre"
      then: "Textarea mostra as instruções atuais"

    # --- Imagem na listagem ---
    - id: "AC-010"
      given: "Serviço com imageUrl preenchida"
      when: "Card é renderizado na listagem"
      then: "Thumbnail da imagem aparece no card acima do nome"

    - id: "AC-011"
      given: "Serviço sem imageUrl (null)"
      when: "Card é renderizado na listagem"
      then: "Card renderiza normalmente sem área de imagem (layout idêntico ao atual)"

    # --- Produto (espelho dos AC de serviço) ---
    - id: "AC-012"
      given: "Modal de criar/editar produto"
      when: "Mesmos cenários de AC-001 a AC-009"
      then: "Mesmos resultados (funcionalidade espelhada)"

    - id: "AC-013"
      given: "Card de produto na listagem"
      when: "Mesmos cenários de AC-010 e AC-011"
      then: "Mesmos resultados"

    # --- Agent Config ---
    - id: "AC-014"
      given: "Usuário navega para /configuracoes e clica na tab 'Agente IA'"
      when: "Tab é carregada"
      then: "Formulário exibe dados atuais do agente (nome, tom, instruções)"

    - id: "AC-015"
      given: "Tab 'Agente IA' aberta"
      when: "Usuário muda nome para 'Atendente Virtual' e clica Salvar"
      then: "PUT /agent/config é chamado; toast de sucesso aparece; campo reflete novo valor"

    - id: "AC-016"
      given: "Tab 'Agente IA' aberta"
      when: "Usuário seleciona tom 'Formal' e salva"
      then: "voiceTone salvo como 'formal'"

    - id: "AC-017"
      given: "Tab 'Agente IA' aberta"
      when: "Usuário preenche instruções gerais com 2000 chars e salva"
      then: "Salvo com sucesso"

    - id: "AC-018"
      given: "Tab 'Agente IA' aberta"
      when: "Usuário tenta salvar nome vazio"
      then: "Erro de validação: 'Nome é obrigatório'"

    - id: "AC-019"
      given: "Backend /agent/config retorna erro 500"
      when: "Tab 'Agente IA' carrega"
      then: "Formulário mostra defaults (nome 'Assistente', tom 'friendly', instruções vazio) ou mensagem de erro"

    # --- FormData / authFetch ---
    - id: "AC-020"
      given: "Criação de serviço com imagem"
      when: "Request é enviado ao backend"
      then: "Content-Type é multipart/form-data com boundary auto-gerado; Authorization header presente"

    - id: "AC-021"
      given: "Sessão expirada (access_token inválido)"
      when: "Qualquer operação é tentada"
      then: "authFetch tenta refresh; se falha, redireciona para login"

  security:
    - id: "SEC-001"
      test: "Upload de arquivo com tipo MIME spoofado (ex: renomear .exe para .jpg) é validado no server action pelo header do arquivo, não pela extensão"
      notes: "Server action valida file.type do File object; backend deve fazer validação adicional"

    - id: "SEC-002"
      test: "agentInstructions/generalInstructions com tags HTML/script são exibidos como texto (React escapa por default)"

    - id: "SEC-003"
      test: "imageUrl em <img src> não executa JavaScript mesmo se URL contiver javascript: protocol"
      notes: "Browsers modernos bloqueiam javascript: em src; considerar sanitizar URL se necessário"

  performance:
    - id: "PERF-001"
      test: "Upload de imagem de 5MB completa em < 5s em conexão 4G"
      notes: "Depende do backend/storage; frontend deve mostrar loading state"

    - id: "PERF-002"
      test: "Thumbnails na listagem usam loading='lazy' para não bloquear rendering"

    - id: "PERF-003"
      test: "Object URLs de preview são revogados ao fechar modal ou trocar imagem"

# ============================================================
# 7. FORA DO ESCOPO
# ============================================================
out_of_scope:
  - "Crop/resize de imagem no frontend (backend faz isso se necessário)"
  - "Drag and drop para upload de imagem (apenas input file)"
  - "Múltiplas imagens por serviço/produto (apenas 1 imagem)"
  - "Galeria de imagens / lightbox"
  - "Compressão de imagem no frontend"
  - "Internacionalização (i18n) — labels em português fixo"
  - "Testes E2E para upload (apenas unitários/integração)"
  - "Migração de dados existentes (serviços sem imagem continuam funcionando)"
  - "Alteração de rotas da sidebar (Agent Config fica dentro de /configuracoes como tab)"
  - "Configuração de múltiplos agentes (apenas 1 agente por tenant)"
  - "Uso de next/image para thumbnails externas (usar <img> nativo por ora)"

# ============================================================
# 8. NOTAS E DECISOES
# ============================================================
notes:
  - decision: "FormData em vez de JSON"
    rationale: >
      O backend já aceita multipart/form-data. Para enviar arquivos binários
      junto com campos de texto, FormData é o padrão correto. O projeto já
      usa esse padrão em AdminUserService.create() (src/lib/services/admin-user-service.ts:40-45).

  - decision: "Server action recebe FormData, não raw File"
    rationale: >
      Next.js server actions suportam FormData nativamente como argumento.
      É mais seguro que serializar File objects. A validação Zod ocorre
      sobre os campos extraídos do FormData.

  - decision: "Usar <img> nativo em vez de next/image para thumbnails"
    rationale: >
      A URL da imagem vem do backend (storage externo). O domínio pode
      variar e não está configurado em next.config.ts remotePatterns.
      Usar <img> com loading="lazy" evita configuração e funciona
      universalmente. Pode migrar para <Image> futuramente.

  - decision: "Agent Config como tab em /configuracoes, não rota separada"
    rationale: >
      O SettingsHub já tem pattern de tabs (agenda, canais, pagamentos).
      Adicionar tab 'agente' é consistente com o design existente.
      Evita criar nova rota na sidebar e mantém configurações centralizadas.

  - decision: "agentInstructions no modal, não na listagem"
    rationale: >
      Instruções são conteúdo longo e técnico, não faz sentido no card
      compacto da listagem. Só aparecem ao abrir modal de edição.

  - decision: "Validação de imagem dupla (client + server action)"
    rationale: >
      O accept no input file filtra no file picker (UX).
      A server action valida tipo e tamanho como defesa real.
      O backend faz a validação final (segurança).

  - decision: "IFinanceService muda para aceitar FormData nos métodos de create/update"
    rationale: >
      A interface precisa refletir a mudança de JSON para multipart.
      Como o backend agora aceita multipart, a interface deve seguir.
      CreateServiceParams/UpdateServiceParams continuam existindo para
      tipar os campos de texto, mas o transporte é FormData.

# ============================================================
# 9. ITEMS A VERIFICAR
# ============================================================
to_verify:
  - item: "Confirmar endpoints exatos do backend para agent config"
    detail: "A spec assume GET /agent/config e PUT /agent/config — confirmar com equipe backend"

  - item: "Confirmar campo de retorno do backend para imageUrl"
    detail: "A spec assume que após upload, o backend retorna o campo 'imageUrl' na resposta de Service/Product"

  - item: "Confirmar se o backend aceita PATCH com multipart/form-data"
    detail: "createService usa POST e updateService usa PATCH — ambos devem aceitar FormData"

  - item: "Confirmar domínio do storage para imageUrl"
    detail: "Se as URLs de imagem vêm de um domínio fixo (ex: storage.googleapis.com), pode-se configurar next/image"

  - item: "Confirmar se o backend retorna defaults para GET /agent/config quando nunca foi configurado"
    detail: "A spec assume que retorna defaults (name='Assistente', voiceTone='friendly', generalInstructions=null) ou 404"

  - item: "Confirmar se o backend precisa de campo explícito para remover imagem (ex: removeImage: true)"
    detail: "A spec atual assume que não enviar o campo 'image' no FormData simplesmente mantém a imagem atual"

