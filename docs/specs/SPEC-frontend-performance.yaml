# ── Segurança ──

security:
  - Nenhum dado sensível exposto via otimizações
  - Headers de segurança preservados no next.config.ts
  - Services mantêm isolamento de autenticação
  - SVG externo não introduz vetores XSS (conteúdo estático controlado)

# ── Estimativa de Impacto ──

impact:
  fcp_improvement: "30-50% redução no First Contentful Paint em rotas pesadas"
  bundle_reduction: "~150-200KB de JS dinâmico removido do bundle principal"
  runtime_perf: "Eliminação de recomputações O(n log n) a cada re-render em tabelas"
